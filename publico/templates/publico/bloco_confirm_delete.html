{% extends "base.html" %}

{% block title %}Excluir Bloco — {{ escola.nome }}{% endblock %}

{% block content %}
<div class="premium-card p-5 text-center" style="max-width: 500px; margin: 2rem auto;">
    <i class="bi bi-exclamation-triangle text-warning" style="font-size: 3rem;"></i>
    <h4 class="mt-3">Excluir Bloco?</h4>
    <p class="text-muted">
        Tem certeza que deseja excluir <strong>"{{ object.titulo }}"</strong>?
    </p>
    <form method="post">
        {% csrf_token %}
        <div class="d-flex gap-2 justify-content-center">
            <a href="{% url 'publico:bloco_list' object.escola.pk %}" class="btn btn-premium-outline">Cancelar</a>
            <button type="submit" class="btn btn-danger">Sim, excluir</button>
        </div>
    </form>
</div>
{% endblock %}
