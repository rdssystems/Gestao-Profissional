{% extends 'base.html' %}

{% block title %}Modo Desenvolvedor{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-4 text-center">
                <i class="bi bi-code-slash text-primary mb-3" style="font-size: 3rem;"></i>
                <h4 class="fw-bold mb-3">Ativar Modo Desenvolvedor</h4>
                <p class="text-muted mb-4 small">Insira a chave mestra para habilitar funcionalidades de sistema em sua conta.</p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4 text-start">
                        <label class="form-label small fw-bold">Chave do Desenvolvedor</label>
                        <input type="password" name="senha_dev" class="form-control form-control-lg rounded-3" placeholder="••••••••••••" required autofocus>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 rounded-3 shadow-sm">
                        Confirmar Identidade
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
