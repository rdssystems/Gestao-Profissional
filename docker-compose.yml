services:
  db:
    image: postgres:16-alpine
    container_name: gq-db
    restart: always
    environment:
      - POSTGRES_DB=gestao_db
      - POSTGRES_USER=gestao_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    # Porta publicada apenas no loopback: o app acessa o banco pela rede
    # interna do Docker (db:5432). Isso remove a exposicao do banco na internet.
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  db-redis:
    image: redis:alpine
    container_name: gq-redis
    restart: always

  web:
    build: .
    container_name: gq-app
    restart: always
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=${DEBUG:-False}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-app.gestaoqualificacao.com.br,.gestaoqualificacao.com.br}
      - SECURE_SSL_REDIRECT=${SECURE_SSL_REDIRECT:-True}
      - REDIS_URL=redis://gq-redis:6379/0
      - REDIS_HOST=gq-redis
      - REDIS_CACHE_URL=redis://gq-redis:6379/1
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=gestao_db
      - DB_USER=gestao_user
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - EMAIL_BACKEND=${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      - EMAIL_HOST=${EMAIL_HOST:-smtp.resend.com}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-True}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-resend}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-noreply@gestaoqualificacao.com.br}
    depends_on:
      - db
      - db-redis

volumes:
  static_volume:
  media_volume:
