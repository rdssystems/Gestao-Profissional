{% extends "base.html" %}

{% block title %}Redefinição de Senha Concluída{% endblock %}

{% block content %}

<style>
    .reset-container {
        max-width: 500px;
        margin: 4rem auto;
        background: white;
        padding: 2.5rem;
        border-radius: 1.5rem;
        box-shadow: 0 12px 28px rgba(0,0,0,0.07);
        text-align: center;
        animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .reset-icon {
        width: 80px;
        margin-bottom: 1.2rem;
        opacity: 0.95;
    }

    .reset-btn {
        border-radius: 50px;
        background: linear-gradient(145deg, #4C7DF0, #6A98F7);
        border: none;
        padding: 0.75rem 2rem;
        font-weight: 600;
        color: white;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .reset-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 18px rgba(76,125,240,0.3);
    }

    .reset-title {
        font-weight: 600;
        color: #42557A;
    }

    .reset-text {
        color: #56627A;
        font-size: 1rem;
        margin-bottom: 1.8rem;
    }
</style>

<div class="reset-container">

    <img src="https://cdn-icons-png.flaticon.com/512/6364/6364574.png"
         class="reset-icon"
         alt="Senha redefinida">

    <h2 class="reset-title mb-3">Senha Redefinida com Sucesso</h2>

    <p class="reset-text">
        Tudo pronto! Sua nova senha foi configurada.  
        Agora você já pode acessar sua conta novamente.
    </p>

    <a href="{% url 'login' %}" class="btn reset-btn">
        Fazer Login
    </a>

</div>

{% endblock %}
