{% extends "simple_base.html" %}

{% block title %}Email de Redefinição Enviado{% endblock %}

{% block content %}

<style>
    .reset-done-container {
        max-width: 520px;
        margin: 4rem auto;
        background: white;
        padding: 2.5rem;
        border-radius: 1.5rem;
        box-shadow: 0 12px 28px rgba(0,0,0,0.07);
        animation: fadeIn 0.55s ease-out;
        text-align: center;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .done-icon {
        width: 82px;
        opacity: 0.9;
        margin-bottom: 1.2rem;
    }

    .done-title {
        font-weight: 600;
        color: #42557A;
    }

    .done-text {
        font-size: 1.05rem;
        color: #56627A;
        margin-top: 0.8rem;
    }

</style>

<div class="reset-done-container">

    <img src="https://cdn-icons-png.flaticon.com/512/6806/6806987.png"
         alt="Email enviado"
         class="done-icon">

    <h2 class="done-title">Email Enviado</h2>

    <p class="done-text">
        Enviamos as instruções para redefinir sua senha.  
        Verifique sua caixa de entrada e também a pasta de spam.
    </p>

</div>

{% endblock %}
