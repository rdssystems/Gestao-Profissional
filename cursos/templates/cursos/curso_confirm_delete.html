{% extends "base.html" %}

{% block title %}Confirmar Exclusão{% endblock %}

{% block content %}
<style>

    body {
        background: #eef1f5 !important;
        font-family: "Inter", sans-serif;
        color: #424a57;
    }

    .delete-card {
        max-width: 500px;
        margin: 6rem auto;
        padding: 2.5rem;
        border-radius: 1.2rem;
        background: #ffffff;
        border: 1px solid rgba(0,0,0,0.05);
        box-shadow:
            0 3px 8px rgba(0,0,0,0.06),
            0 18px 40px rgba(0,0,0,0.12);
        animation: fadeIn 0.45s ease-out;
        text-align: center;
        position: relative;
    }

    .delete-card::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 3px;
        background: linear-gradient(90deg,
            rgba(75,93,255,0.28),
            rgba(99,114,255,0.1)
        );
        border-radius: 1.2rem 1.2rem 0 0;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(18px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .delete-icon {
        font-size: 3.6rem;
        color: #e74a4a;
        opacity: 0.9;
        margin-bottom: 1rem;
    }

    .delete-title {
        font-weight: 700;
        color: #1f2937;
        margin-bottom: 0.9rem;
    }

    .delete-text {
        color: #4b5563;
        font-size: 1.08rem;
        margin-bottom: 2rem;
        line-height: 1.45;
    }

    .btn-delete {
        padding: 0.55rem 1.5rem;
        border-radius: 0.7rem;
        background: #e63946;
        border: none;
        color: #fff;
        font-weight: 600;
        transition: 0.22s ease;
    }

    .btn-delete:hover {
        background: #d62839;
        transform: translateY(-2px);
        box-shadow: 0 8px 22px rgba(214,40,57,0.25);
    }

    .btn-cancel {
        padding: 0.55rem 1.5rem;
        border-radius: 0.7rem;
        font-weight: 500;
        background: #aeb6c2;
        border: none;
        color: white;
        transition: 0.22s ease;
    }

    .btn-cancel:hover {
        background: #9aa2b0;
        transform: translateY(-2px);
    }

</style>

<div class="delete-card">

    <!-- Ícone de lixeira minimalista com Bootstrap Icons -->
    <i class="bi bi-trash delete-icon"></i>

    <h2 class="delete-title">Confirmar Exclusão</h2>

    <p class="delete-text">
        Tem certeza de que deseja excluir o curso<br>
        <strong>{{ object.nome }}</strong>?
    </p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-delete me-2">Excluir</button>
        <a href="{% url 'cursos:detalhe_curso' pk=object.pk %}"
           class="btn btn-cancel">Cancelar</a>
    </form>

</div>

<!-- Ícones -->
<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

{% endblock %}
