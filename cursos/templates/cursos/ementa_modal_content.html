<div class="modal-header text-white" style="background-color: #6d28d9;">
    <h5 class="modal-title py-1" id="ementaModalLabel">
        <i class="bi bi-journal-text me-2"></i>Ementa: {{ ementa.titulo }}
    </h5>
    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<div class="modal-body p-4" style="max-height: 70vh; overflow-y: auto;">
    <div class="premium-badge mb-3 border-0" style="background-color: #f5f3ff; color: #6d28d9;">
        <i class="bi bi-clock-history me-1"></i> Última atualização em: {{ ementa.data_atualizacao|date:"d/m/Y" }}
    </div>
    
    <div class="lh-base text-dark" style="white-space: pre-wrap; font-size: 1.05rem;">
{{ ementa.conteudo }}
    </div>
</div>
<div class="modal-footer border-top-0 pb-4 px-4">
    <button type="button" class="btn btn-premium-outline w-100 py-2 fw-bold" data-bs-dismiss="modal">
        Fechar Visualização
    </button>
</div>
